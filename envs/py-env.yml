name: py-env
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12
  - ipykernel
  # Geospatial stack (ARM64 native via conda-forge)
  - gdal>=3.5
  - geopandas
  - rasterio>=1.4.4
  - rioxarray
  - cartopy
  - shapely
  - pyproj
  - fiona
  # Core scientific
  - numpy
  - pandas
  - scipy
  - xarray
  - dask
  - dask-geopandas
  - matplotlib
  - statsmodels
  # Climate-specific
  - xclim>0.56.0
  # Data I/O
  - intake
  - intake-esm<=2023.11.10
  - intake-xarray
  - fastparquet>=2025.12.0
  - numcodecs<=0.14.1
  - zarr
  - s3fs
  - fsspec
  - boto3<=1.37.3
  # Utilities
  - ipywidgets>=8.1.8
  - tqdm
  - pytz
  - geopy
  - pip
  - pip:
    - climakitae @ https://github.com/cal-adapt/climakitae/archive/refs/tags/1.4.0.zip
